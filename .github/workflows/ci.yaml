name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Resolve workspace
        run: flutter pub get
      - name: Format
        run: dart format --output=none --set-exit-if-changed packages
      - name: Analyze
        run: dart run melos run analyze --no-select
      - name: Test (Dart)
        run: dart run melos run test --no-select
      - name: Test (Flutter)
        run: dart run melos run test:flutter --no-select
